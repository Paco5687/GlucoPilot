services:
  glucopilot:
    # `docker compose up -d` pulls this prebuilt image; add `--build` to build
    # from source instead (which tags the local build with the same name).
    image: ghcr.io/paco5687/glucopilot:${IMAGE_TAG:-latest}
    build: .
    restart: unless-stopped
    env_file:
      - .env
    extra_hosts:
      # Reach host-local services (e.g. a local LLM). See docs/LOCAL_MODELS.md.
      - "host.docker.internal:host-gateway"
    volumes:
      - data:/data
      # Unix sockets to host-local LLM servers (optional; see docs/LOCAL_MODELS.md).
      - ./run:/run/glucopilot
      # Optional: mount a folder of exports for one-time imports, e.g.
      #   docker compose exec glucopilot python -m server.import_base44_export /import/GlucoseReading_export.csv
      # - ./import:/import:ro
    networks:
      - proxy
    labels:
      # Traefik example. Adapt to your reverse proxy, or drop these and publish
      # a port directly (see docs/DEPLOY.md).
      - traefik.enable=true
      - traefik.docker.network=${TRAEFIK_NETWORK:-proxy}
      - traefik.http.routers.glucopilot.rule=Host(`${TRAEFIK_HOST}`)
      - traefik.http.routers.glucopilot.entrypoints=${TRAEFIK_ENTRYPOINT:-websecure}
      - traefik.http.routers.glucopilot.tls=true
      - traefik.http.routers.glucopilot.tls.certresolver=${TRAEFIK_CERTRESOLVER:-letsencrypt}
      - traefik.http.services.glucopilot.loadbalancer.server.port=8000

volumes:
  # Named explicitly so it's stable regardless of the compose project name.
  # Set DATA_VOLUME in .env to attach an existing volume (e.g. after a rename).
  data:
    name: ${DATA_VOLUME:-glucopilot_data}

networks:
  # Your reverse proxy's external network. Set TRAEFIK_NETWORK in .env to match.
  proxy:
    external: true
    name: ${TRAEFIK_NETWORK:-proxy}
