name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve GlucoPilot. **Please don't include real health
        data or personal information** — redact anything sensitive from logs and
        screenshots.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what actually happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to …
        2. Click …
        3. See …
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Image tag, or `git rev-parse --short HEAD`.
  - type: dropdown
    id: deploy
    attributes:
      label: How are you running it?
      options:
        - Local (install.sh / docker-compose.local.yml)
        - Server (behind a reverse proxy)
        - Demo mode
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: "Output from `docker compose logs`, with any personal data removed."
      render: shell
