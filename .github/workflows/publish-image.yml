name: Publish image

# Builds and pushes a container image to the GitHub Container Registry so users
# can `docker pull` instead of building from source.
#   - push to main      -> ghcr.io/<owner>/glucopilot:edge (+ :sha)
#   - release / v* tag   -> :<version>, :<major>.<minor>, :latest (+ :sha)

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  release:
    types: [published]

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/glucopilot
          # Pre-1.0: `latest` tracks main so `docker compose up` works immediately;
          # version tags also publish semver tags for pinning.
          tags: |
            type=edge,branch=main
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          # linux/amd64 covers most self-host targets; arm64 can be added later.
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
